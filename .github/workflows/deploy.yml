name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: student-mobile

      # Clone design system so file: dependencies resolve
      - uses: actions/checkout@v4
        with:
          repository: Sicaho-collab/alumable-design-system
          path: Components/alumable-design-system

      # Build design-tokens and ui-mobile so dist/ exists
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: student-mobile/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@sicaho-collab'

      - run: npm install && npm run build
        working-directory: Components/alumable-design-system
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}

      - run: npm ci
        working-directory: student-mobile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}

      - run: npx expo export --platform web
        working-directory: student-mobile
        env:
          EXPO_PUBLIC_BASE_PATH: /student-mobile

      - uses: actions/upload-pages-artifact@v3
        with:
          path: student-mobile/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
